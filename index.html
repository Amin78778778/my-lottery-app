<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotereya Sistemi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #17212b;
            --panel-bg: #242f3d;
            --accent-blue: #50a2e9;
            --text-main: #ffffff;
            --text-gray: #8193a8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Əsas Panel */
        .card {
            background: var(--panel-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .lottery-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .lottery-sub { color: var(--accent-blue); font-size: 14px; margin-bottom: 20px; }

        .image-container {
            background: linear-gradient(135deg, #5d78ff, #3a4bb1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .info-row {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .label { color: var(--text-gray); }

        /* Slider Bölməsi */
        .buy-section {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        input[type=range] {
            width: 100%;
            margin: 15px 0;
            accent-color: var(--accent-blue);
        }

        .buy-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .buy-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <div class="lottery-title">Lottery #11</div>
        <div class="lottery-sub">Cupid Charm X10</div>

        <div class="image-container">
            <span style="font-size: 60px;">❤️</span>
        </div>

        <div class="info-row">
            <span class="label">Tickets</span>
            <span>9860 / 10000</span>
        </div>

        <div class="info-row">
            <span class="label">Your tickets</span>
            <span id="userTickets">2</span>
        </div>

        <div class="buy-section">
            <div class="slider-header">
                <span class="label">Number of tickets</span>
                <b id="ticketValue">1</b>
            </div>
            
            <input type="range" id="ticketSlider" min="1" max="10" value="1" oninput="updatePrice(this.value)">
            
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-gray);">
                <span>1</span>
                <span>10</span>
            </div>

            <button class="buy-btn" onclick="processPayment()">
                Buy for <span id="totalPrice">5</span> ⭐️
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function updatePrice(val) {
            document.getElementById('ticketValue').innerText = val;
            document.getElementById('totalPrice').innerText = val * 5;
        }

        function processPayment() {
            const count = document.getElementById('ticketSlider').value;
            const price = count * 5;

            tg.showPopup({
                title: 'Ödəniş Təsdiqi',
                message: count + ' bilet üçün ' + price + ' ulduz ödəniləcək. Davam edilsin?',
                buttons: [
                    {id: 'ok', type: 'ok', text: 'Bəli'},
                    {id: 'cancel', type: 'cancel', text: 'Ləğv et'}
                ]
            });
        }
    </script>
</body>
</html>
