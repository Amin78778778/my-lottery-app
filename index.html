<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-dark: #12121e; --panel-bg: #1e1e2e; --accent-blue: #5d78ff; --text-main: #ffffff; --text-gray: #a1a1c1; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--panel-bg); border-radius: 16px; width: 100%; max-width: 400px; padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .image-container { background: #12121e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .lottery-image { max-width: 100%; max-height: 180px; object-fit: contain; }
        .info-row { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .label { color: var(--text-gray); }
        .buy-section { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; margin-top: 15px; }
        .buy-btn { background: var(--accent-blue); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 20px; font-weight: bold;">Lottery #11</div>
        <div style="color: #f1c40f; margin-bottom: 20px;">Halloween Harvest</div>

        <div class="image-container">
            <img src="KiUSpHwiLpZbyQtO3P25vW4JmrIQTIqZCdvySYde.jpg" class="lottery-image">
        </div>

        <div class="info-row">
            <span class="label">Qalan Biletlərin Sayı:</span>
            <span id="liveCount">Yüklənir...</span>
        </div>

        <div class="buy-section">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span class="label">Sayı:</span>
                <b id="tVal">1</b>
            </div>
            <input type="range" id="ticketSlider" min="1" max="10" value="1" style="width:100%; accent-color:#f1c40f;" oninput="document.getElementById('tVal').innerText = this.value; document.getElementById('price').innerText = this.value * 5">
            <button class="buy-btn" onclick="buyTicket()">Al: <span id="price">5</span> ⭐️</button>
        </div>
    </div>

    <script>
        // FİREBASE KONFİQURASİYASI
        const firebaseConfig = {
databaseURL: "https://my-lottery-db-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Bazadan real vaxtda bilet sayını oxumaq
        database.ref('tickets_left').on('value', (snapshot) => {
            const count = snapshot.val();
document.getElementById('liveCount').innerText = (count !== null ? count : "Yüklənir...") + " / 15";
        });

        // 2. Bilet alma funksiyası
function buyTicket() {
    const countToBuy = document.getElementById('ticketSlider').value;
    const price = countToBuy * 5; 

    const data = {
        action: "buy_stars",
        count: parseInt(countToBuy),
        total_price: price
    };

    // Bu kod məlumatı bota göndərir
    window.Telegram.WebApp.sendData(JSON.stringify(data));
    window.Telegram.WebApp.close();
}

            database.ref('tickets_left').transaction((currentCount) => {
                if (currentCount >= countToBuy) {
                    return currentCount - countToBuy;
                }
                return; // Əgər bilet çatmasa heç nə etmə
            }, (error, committed) => {
                if (committed) {
                    tg.showPopup({ 
                        title: 'Uğurlu!', 
                        message: countToBuy + ' bilet balansınızdan çıxıldı. Uğurlar!' 
                    });
                } else {
                    tg.showPopup({ title: 'Xəta', message: 'Bilet alınmadı və ya tükənib.' });
                }
            });
        }
    </script>
</body>
</html>
