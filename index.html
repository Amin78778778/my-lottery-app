<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peşəkar Lotereya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --main-panel-bg: #2d3e5a;
            --button-primary: #5d78ff;
            --text-color: white;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --star-color: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .lottery-panel {
            background: var(--main-panel-bg);
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Yuxarı Hissə (Lottery #11 və Sold) */
        .panel-header {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            font-size: 14px;
        }

        /* Mərkəzi Hissə (Düymə və Şəkil) */
        .panel-center {
            padding: 20px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .participate-btn {
            background: var(--button-primary);
            color: var(--text-color);
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .participate-btn:active {
            transform: scale(0.95);
        }

        /* Şəkil (Sadəlik üçün mən burada vizual bir blok istifadə edəcəm) */
        .panel-image {
            width: 70px;
            height: 70px;
            background: #202b3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        /* Aşağı Hissə (Tiket sayı və Ulduz) */
        .panel-footer {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 15px;
            text-align: center;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .sold-label {
            color: var(--text-secondary);
        }

        .star-icon {
            color: var(--star-color);
            font-size: 16px;
        }

    </style>
</head>
<body>

    <div class="lottery-panel">
        
        <div class="panel-header">
            <div>Lottery #11</div>
            <div>Sold: <span id="soldCount">9860</span>/10000</div>
        </div>

        <div class="panel-center">
            <button class="participate-btn" onclick="startParticipation()">Participate</button>
            
            <div class="panel-image">🔒</div> 
        </div>

        <div class="panel-footer">
            10000 tickets • 5 <span class="star-icon">★</span>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function startParticipation() {
            // İştirak et düyməsini sıxanda nə olacaq
            const currentSold = parseInt(document.getElementById('soldCount').innerText);
            
            if (currentSold < 10000) {
                // Sadəlik üçün sayı artırırıq (real bazada back-end lazımdır)
                document.getElementById('soldCount').innerText = currentSold + 1;
                
                tg.showPopup({
                    title: 'Təbriklər!',
                    message: 'Lotereyaya iştirakınız uğurla qeydə alındı! 🎉',
                    buttons: [{type: 'ok'}]
                });
            } else {
                tg.showPopup({
                    title: 'Xəta',
                    message: 'Təəssüf, bütün biletlər satılıb.',
                    buttons: [{type: 'close'}]
                });
            }
        }
    </script>
</body>
</html>
