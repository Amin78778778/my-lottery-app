<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1c; color: white; text-align: center; padding: 20px; }
        .card { background: #2c2c2c; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 80%; margin: 20px 0; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; }
        .info { margin-bottom: 20px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>NFT Lottery Aze</h2>
        <div class="info">Qalan bilet: <span id="liveCount">15 / 15</span></div>
        <div class="info">Seçilən: <span id="tVal">1</span> ədəd</div>
        <input type="range" id="ticketsSlider" min="1" max="15" value="1" oninput="updatePrice(this.value)">
        <div class="info">Cəmi: <span id="price">5</span> Star</div>
        <button onclick="buyTicket()">ÖDƏ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // SİZİN FİREBASE KONFİQURASİYANIZ (Bunu özünkü ilə dəyişməyibsənsə belə qalsın)
        const firebaseConfig = {
            databaseURL: "https://lottery-aze-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Bazadan bilet sayını oxumaq
        database.ref('tickets_left').on('value', (snapshot) => {
            const count = snapshot.val();
            document.getElementById('liveCount').innerText = (count !== null) ? count + " / 15" : "15 / 15";
        });

        // 2. Qiyməti yeniləmək
        function updatePrice(val) {
            document.getElementById('tVal').innerText = val;
            document.getElementById('price').innerText = val * 5;
        }

        // 3. Ödəniş funksiyası
        function buyTicket() {
            const countToBuy = document.getElementById('ticketsSlider').value;
            const totalPrice = countToBuy * 5;

            const data = {
                action: "buy_stars",
                count: parseInt(countToBuy),
                total_price: parseInt(totalPrice)
            };

            tg.sendData(json.stringify(data));
            
            // 1 saniyə gözlə və bağla
            setTimeout(() => { tg.close(); }, 1000);
        }
    </script>
</body>
</html>
